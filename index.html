<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airsell Cargo | Trusted Logistics Partner</title>
    <style>
        :root { --airsell-red: #d32f2f; --airsell-green: #2e7d32; --charcoal: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: var(--charcoal); }
        header { background: #000; color: white; padding: 20px; text-align: center; }
        .hero { background: #f4f4f4; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--airsell-red); }
        .track-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; margin-top: -40px; width: 80%; max-width: 500px; }
        .btn { background: var(--airsell-red); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .certifications { padding: 40px; text-align: center; font-weight: bold; color: var(--airsell-green); }
    </style>
</head>
<body>

<header style="background: #000; color: white; padding: 20px; text-align: center;">
    <img src="logo.jpg" alt="Airsell Cargo Logo" style="height: 120px; width: auto; margin-bottom: 10px;">
    <h1 style="margin: 5px 0;">AIRSELL CARGO</h1>
    <p style="margin: 0; color: #ccc;">Connecting East Africa to the World</p>
</header>

<section class="hero">
    <h2>Reliable Freight Forwarding Solutions</h2>
    <p>IATA CargoLink Member | FIATA Member | Hargeisa, Somaliland</p>
</section>

<div style="text-align: center;">
    <div class="track-box">
        <h3>Quick Track Your Cargo</h3>
        <input type="text" placeholder="Enter AWB Number..." style="padding: 10px; width: 70%;">
        <button class="btn">Track</button>
    </div>
</div>

<div class="certifications">
    <span>✓ IATA COMPLIANT</span> &nbsp;&nbsp; | &nbsp;&nbsp; <span>✓ FIATA ACCREDITED</span>
</div>

<footer style="text-align: center; padding: 20px; font-size: 0.8em;">
    <p>© 2026 Airsell Cargo Service Agent. Last Updated: 2026-04-03</p>
</footer>

</body>
</html>
